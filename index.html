<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Re-Acción</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eaf7ff, #eaf7ea);
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    img {
      width: 250px;
      margin-top: 20px;
    }

    h1 {
      font-size: 42px;
      color: #1976D2;
      margin: 20px 0 10px;
    }

    p {
      font-size: 22px;
      color: #2E7D32;
    }

    .box {
      background: white;
      margin: 40px auto;
      padding: 25px;
      border-radius: 15px;
      max-width: 700px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.png">

  <h1>RE-ACCIÓN</h1>
  <p>De la Pantalla al Ocio Activo</p>

  <div class="box">
    <h2>Proyecto Socioeducativo</h2>
    <p>
      Este proyecto busca fomentar alternativas de ocio activo,
      promoviendo el juego, la naturaleza y la interacción social
      frente al uso excesivo de pantallas.
    </p>
  </div>

</div>

</body>
</html>
